[graph]
targets = []

[advisories]
ignore = [
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is marked unmaintained; risk tracked in Week1 security checklist" },
]

[licenses]
version = 2
allow = [
  "GPL-3.0-or-later",
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "Zlib",
]
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
